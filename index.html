<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Impact Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ========================= -->
  <!-- Google Analytics GA4 -->
  <!-- ========================= -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CEK689H970"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CEK689H970');
  </script>

  <!-- ========================= -->
  <!-- Basic Page Styling -->
  <!-- ========================= -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      text-align: center;
      padding: 50px;
    }

    .product-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      display: inline-block;
      max-width: 350px;
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin: 15px 0;
    }

    button {
      background-color: #0066ff;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0047b3;
    }
  </style>
</head>

<body>

<h1>Impact Store</h1>
<p>Exclusive Limited Offer</p>

<!-- ========================= -->
<!-- Product Section -->
<!-- ========================= -->
<div class="product-card">

  <img src="https://via.placeholder.com/350x250" alt="Impact Sneakers">

  <h2 id="product-name">Impact Sneakers</h2>

  <div class="price">
    $<span id="product-price">29.99</span>
  </div>

  <button id="add-to-cart-click" onclick="handleAddToCart()">
    Add to Cart
  </button>

</div>

<!-- ========================= -->
<!-- Tracking Logic -->
<!-- ========================= -->
<script>
function handleAddToCart() {

  var productName = document.getElementById("product-name").innerText;
  var productPrice = document.getElementById("product-price").innerText;

  window.dataLayer = window.dataLayer || [];

  // Push event to GTM dataLayer
  dataLayer.push({
    event: "custom_add_to_cart_click",
    value: parseFloat(productPrice),
    currency: "USD",
    item_name: productName
  });

  // Send event directly to GA4 (gtag)
  gtag('event', 'custom_add_to_cart_click', {
    value: parseFloat(productPrice),
    currency: 'USD',
    item_name: productName
  });

  alert("Product added to cart!");

  console.log("Event pushed to dataLayer and GA4:", {
    event: "custom_add_to_cart_click",
    value: productPrice,
    item_name: productName
  });
}
</script>

</body>
</html>
