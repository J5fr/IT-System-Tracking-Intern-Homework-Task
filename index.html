<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IT-System-Tracking-Intern-Homework-Task</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ========================= -->
  <!-- Google Tag Manager (HEAD) -->
  <!-- ========================= -->
  <script>
    (function(w,d,s,l,i){
      w[l]=w[l]||[];
      w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});
      var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),
          dl=l!='dataLayer'?'&l='+l:'';
      j.async=true;
      j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;
      f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-NXMJ935F');
  </script>
  <!-- End Google Tag Manager -->

  <!-- ========================= -->
  <!-- Basic Page Styling -->
  <!-- ========================= -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      text-align: center;
      padding: 50px;
    }

    .product-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      display: inline-block;
      max-width: 350px;
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin: 15px 0;
    }

    button {
      background-color: #0066ff;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0047b3;
    }
  </style>
</head>

<body>

<!-- ========================= -->
<!-- Google Tag Manager (NOSCRIPT) -->
<!-- ========================= -->
<noscript>
  <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NXMJ935F"
    height="0"
    width="0"
    style="display:none;visibility:hidden">
  </iframe>
</noscript>

<h1>Impact Store</h1>
<p>Exclusive Limited Offer</p>

<!-- ========================= -->
<!-- Product Section -->
<!-- ========================= -->
<div class="product-card">

  <img src="https://via.placeholder.com/350x250" alt="Impact Sneakers">

  <h2 id="product-name">Impact Sneakers</h2>

  <div class="price">
    $<span id="product-price">29.99</span>
  </div>

  <button id="add-to-cart-click" onclick="handleAddToCart()">
    Add to Cart
  </button>

</div>

<!-- ========================= -->
<!-- Tracking Logic -->
<!-- ========================= -->
<script>
function handleAddToCart() {

  var productName = document.getElementById("product-name").innerText;
  var productPrice = document.getElementById("product-price").innerText;

  window.dataLayer = window.dataLayer || [];

  dataLayer.push({
    event: "custom_add_to_cart_click",
    value: parseFloat(productPrice),
    currency: "USD",
    item_name: productName
  });

  alert("Product added to cart!");

  console.log("Event pushed to dataLayer:", {
    event: "custom_add_to_cart_click",
    value: productPrice,
    item_name: productName
  });
}
</script>

</body>
</html>
